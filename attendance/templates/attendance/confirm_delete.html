{% extends 'base.html' %}
{% block title %}Delete {{ type }}{% endblock %}
{% block page_title %}Delete {{ type }}{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="form-card text-center" style="border:2px solid #F6DEDD">
      <div style="font-size:3.5rem;margin-bottom:1rem">🗑️</div>
      <h5 class="fw-bold text-danger">Delete {{ type }}</h5>
      <p class="text-muted" style="font-size:.9rem;margin:1rem 0">
        Are you sure you want to delete <strong>{{ object }}</strong>?<br/>
        <span style="font-size:.82rem">This action cannot be undone.</span>
      </p>
      <form method="POST">
        {% csrf_token %}
        <div class="d-flex gap-2 justify-content-center mt-3">
          <button type="submit" class="btn btn-danger" style="border-radius:10px;padding:.65rem 1.5rem;font-weight:600">
            <i class="bi bi-trash me-2"></i>Yes, Delete
          </button>
          <a href="javascript:history.back()" class="btn btn-outline-secondary" style="border-radius:10px;padding:.65rem 1.5rem">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
