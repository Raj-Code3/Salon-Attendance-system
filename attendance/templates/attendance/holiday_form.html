{% extends 'base.html' %}
{% block title %}Add Holiday{% endblock %}
{% block page_title %}Add Holiday{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="form-card">
      <div class="section-header"><i class="bi bi-stars" style="color:#B8862C"></i> Add Holiday</div>
      <form method="POST">
        {% csrf_token %}
        {% for field in form %}
        <div class="mb-3">
          <label class="form-label fw-semibold" style="font-size:.82rem">{{ field.label|upper }}</label>
          {{ field }}
          {% if field.errors %}<div class="text-danger mt-1" style="font-size:.78rem">{{ field.errors.as_text }}</div>{% endif %}
        </div>
        {% endfor %}
        <div class="d-flex gap-2 mt-3">
          <button type="submit" class="btn" style="background:#5C1F2E;color:#fff;border-radius:10px;font-weight:600">
            <i class="bi bi-check-circle me-2"></i>Save Holiday
          </button>
          <a href="{% url 'holiday_list' %}" class="btn btn-outline-secondary" style="border-radius:10px">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
